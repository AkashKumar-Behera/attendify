<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendify</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0b0f19;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
}

/* HEADER */

.header {
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    background: #141a2e;
    font-size: 24px;
    font-weight: bold;
    border-bottom: 1px solid #2c355c;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 40px;
}

.header-controls {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 14px;
}

select {
    background: #1b2138;
    color: white;
    border: 1px solid #2c355c;
    padding: 8px 12px;
    border-radius: 5px;
    font-size: 14px;
    cursor: pointer;
}

.date-input {
    background: #1b2138;
    color: white;
    border: 1px solid #2c355c;
    padding: 8px 12px;
    border-radius: 5px;
    font-size: 14px;
}

.btn-session {
    background: #00bcd4;
    color: black;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
}

.btn-session:hover {
    background: #00acc1;
}

.btn-end {
    background: #1b2138;
    color: white;
    border: 1px solid #2c355c;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
}

.header-right {
    font-size: 14px;
    color: #888;
}

/* STATS SECTION */

.stats {
    background: #141a2e;
    padding: 15px 40px;
    display: flex;
    gap: 40px;
    border-bottom: 1px solid #2c355c;
    font-size: 14px;
}

.stat-item {
    display: flex;
    gap: 10px;
}

/* MAIN LAYOUT */

.main-container {
    display: flex;
    padding: 30px 40px;
    gap: 30px;
}

.students-section {
    flex: 1;
}

.grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 10px;
    margin-bottom: 30px;
}

/* STUDENT BOX */

.student-box {
    background: #1b2138;
    border: 1px solid #2c355c;
    border-radius: 5px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    min-height: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 13px;
}

.student-box:hover {
    border-color: #00bcd4;
}

.student-name {
    font-weight: bold;
    font-size: 12px;
}

.student-number {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
}

/* STATUS COLORS */

.present {
    background: #00c853;
    border-color: #69f0ae;
    color: white;
}

.absent {
    background: #ff1744;
    border-color: #ff5252;
    color: white;
}

.pending {
    background: #1b2138;
    border-color: #ffa726;
}

/* SIDEBAR */

.sidebar {
    width: 320px;
}

.qr-container {
    background: #141a2e;
    border: 1px solid #2c355c;
    border-radius: 5px;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
}

.qr-title {
    font-size: 14px;
    margin-bottom: 15px;
    color: #888;
}

.qr-code {
    width: 200px;
    height: 200px;
    background: white;
    margin: 0 auto 15px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #666;
}

.qr-link {
    font-size: 11px;
    color: #00bcd4;
    word-break: break-all;
    margin-bottom: 10px;
}

.timer-display {
    font-size: 24px;
    color: #00e5ff;
    margin: 10px 0;
}

.status-legend {
    font-size: 12px;
    margin-top: 15px;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
}

.legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 2px;
}

.legend-dot.present {
    background: #00c853;
}

.legend-dot.pending {
    background: #ffa726;
}

.legend-dot.rejected {
    background: #ff1744;
}

/* ACTION BUTTONS */

.action-buttons {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
}

.btn {
    flex: 1;
    padding: 12px;
    border: 1px solid #2c355c;
    border-radius: 5px;
    background: #1b2138;
    color: white;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    border-color: #00bcd4;
    background: #252d45;
}

.btn-primary {
    background: #00bcd4;
    color: black;
    border-color: #00bcd4;
}

.btn-primary:hover {
    background: #00acc1;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-left">
        <div style="font-size: 20px;">Attendify</div>
        <div class="header-controls">
            <span>Section</span>
            <select id="section">
                <option>A</option>
                <option>B</option>
                <option>C</option>
            </select>
            <span>Subject</span>
            <select id="subject">
                <option>MC</option>
                <option>DS</option>
                <option>AI</option>
            </select>
            <span>Date</span>
            <input type="date" class="date-input" id="date" value="2026-03-13">
            <button class="btn-session">Start Session</button>
            <button class="btn-end">End</button>
        </div>
    </div>
    <div class="header-right">Not signed in</div>
</div>

<!-- STATS -->
<div class="stats">
    <div class="stat-item">
        <span>Present:</span>
        <strong id="present-count">0</strong>
    </div>
    <div class="stat-item">
        <span>Pending:</span>
        <strong id="pending-count">0</strong>
    </div>
    <div class="stat-item">
        <span>Total:</span>
        <strong id="total-count">84</strong>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-container">
    <div class="students-section">
        <div class="grid" id="grid"></div>
        <div class="action-buttons">
            <button class="btn">Mark All Present</button>
            <button class="btn">Clear All</button>
            <button class="btn btn-primary">Save Confirmed</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="qr-container">
            <div class="qr-title">QR Preview 2026-03-13</div>
            <div class="qr-code">
                [QR Code]
            </div>
            <div class="qr-link">https://attendify-mobile.netlify.app?sessionId=sess-mmohdu8</div>
            <div class="timer-display" id="timer">01:28</div>
            <div class="status-legend">
                <div class="legend-item">
                    <div class="legend-dot present"></div>
                    <span>Present</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot pending"></div>
                    <span>Pending</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot rejected"></div>
                    <span>Rejected (on timer end)</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>

const studentNames = [
    "Aashish", "Abhipsa", "Abhisek", "Abhishek", "Abhinash", "Aditri", "Aditya", "Aditya", "Adyasha", "Akansha", "Akash", "Aliva",
    "Anirudh", "Anish", "Ankit", "Ankit", "Arijit", "Arman", "Ayush-Behera", "Ayush-Kumar", "Ayush-Bastia", "Badri", "Barsa", "Barun",
    "Bhabani", "Biswajit", "Biswajita", "Brajesh", "Chinmaya", "Chiranjih", "Damodar", "Debasish", "Doulat", "Hafijul", "Jagadish", "Jignesh",
    "Jitendra", "Jogendra", "Jyoti", "Jyoti", "Krushna", "Lokesh", "M Venkat", "Manish", "Manish", "Md", "Md", "Mehwash",
    "Minal", "Mirturjay", "Naha", "Payal", "Pratiksha", "Pratyush", "Pritam", "Prithviraj", "Priti", "Priyanka", "Priyanshu", "Priyanshu",
    "Radheshyam", "Rahul", "Rakesh", "Reetika", "Roshan", "Ryan", "Sagar", "Sahil", "Saishree", "Samarjeet", "Sambit", "Samir",
    "Sandeep", "Sandeep"
];

const grid = document.getElementById("grid");
const totalStudents = 84;

// Create student boxes
for (let i = 1; i <= totalStudents; i++) {
    const box = document.createElement("div");
    box.className = "student-box";
    box.id = "student-" + i;
    
    const name = document.createElement("div");
    name.className = "student-name";
    name.innerText = studentNames[i - 1] || "Student " + i;
    
    const number = document.createElement("div");
    number.className = "student-number";
    number.innerText = String(i).padStart(2, '0');
    
    box.appendChild(name);
    box.appendChild(number);
    
    // Toggle status on click
    box.addEventListener("click", function() {
        if (box.classList.contains("present")) {
            box.classList.remove("present");
        } else {
            box.classList.add("present");
        }
        updateStats();
    });
    
    grid.appendChild(box);
}

// Update statistics
function updateStats() {
    const presentCount = document.querySelectorAll(".student-box.present").length;
    document.getElementById("present-count").innerText = presentCount;
}

// Mark All Present button
document.querySelectorAll(".btn")[0].addEventListener("click", function() {
    document.querySelectorAll(".student-box").forEach(box => {
        box.classList.add("present");
    });
    updateStats();
});

// Clear All button
document.querySelectorAll(".btn")[1].addEventListener("click", function() {
    document.querySelectorAll(".student-box").forEach(box => {
        box.classList.remove("present");
    });
    updateStats();
});

// Timer countdown
let timeRemaining = 88; // 01:28 in seconds
setInterval(() => {
    if (timeRemaining > 0) {
        timeRemaining--;
        const minutes = Math.floor(timeRemaining / 60);
        const seconds = timeRemaining % 60;
        document.getElementById("timer").innerText = 
            String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
    }
}, 1000);

</script>

</body>
</html>
