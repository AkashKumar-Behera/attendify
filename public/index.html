<!DOCTYPE html>

<head>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#020c1f;
    color:white;
}

.container{
    padding:20px;
}

.topbar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#0ea5e9;
    color:white;
    cursor:pointer;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
    gap:12px;
}

.card{
    background:#071a35;
    border-radius:10px;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    font-weight:bold;
    border:1px solid #0c2a52;
    cursor:pointer;
    transition:0.2s;
}

.card:hover{
    background:#0b2c55;
}

.present{
    background:#0f5132;
    border-color:#1dd1a1;
}

.pending{
    background:#3d2c00;
    border-color:#f59e0b;
}

</style>
</head>

<body>

<div class="container">

<script>

const grid = document.getElementById("grid")

for(let i=1;i<=84;i++){

let card = document.createElement("div")
card.className="card"
card.innerText=i

card.onclick=()=>{

if(card.classList.contains("present")){
card.classList.remove("present")
card.classList.add("pending")
}

else if(card.classList.contains("pending")){
card.classList.remove("pending")
}

else{
card.classList.add("present")
}

}

grid.appendChild(card)

}

function markAll(){

document.querySelectorAll(".card").forEach(c=>{
c.classList.add("present")
})

}

function clearAll(){

document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("present","pending")
})

}

</script>
