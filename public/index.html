<!DOCTYPE html>
<html>
<head>

<title>Attendify</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<h1>Attendify QR Attendance</h1>

<div class="controls">

<select id="section">

<button id="endBtn">End Session</button>

</div>

<div id="qrBox"></div>

<h2>Attendance</h2>

<div id="grid"></div>

<script src="app.js"></script>

</body>
</html>
