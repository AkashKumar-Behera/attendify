<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendify Dashboard</title>
<link rel="stylesheet" href="mobileCSS.css">
</head>

<body>

<header class="topbar">

<div class="logo">Attendify</div>

<nav class="menu">
<button class="active">Home</button>
<button>Syllabus</button>
<button>Leaderboard</button>
<button>Profile</button>
</nav>

<div class="profile">
<img src="https://i.pravatar.cc/40">
<div>
<p>Pritam Das</p>
<span>F23029007064</span>
</div>
</div>

</header>


<div class="container">

<div class="left">

<div class="tabs">
<button class="active">Today</button>
<button>Weekly</button>
<button>Month</button>
</div>


<div class="attendance-grid">

<div class="row">
<span>Mon</span>
<div class="cells"></div>
</div>

<div class="row">
<span>Tus</span>
<div class="cells"></div>
</div>

<div class="row">
<span>Wed</span>
<div class="cells"></div>
</div>

<div class="row">
<span>Thu</span>
<div class="cells"></div>
</div>

</div>


<div class="cards">

<div class="card"></div>
<div class="card"></div>
<div class="card"></div>

</div>

</div>


<div class="right">

<div class="circle">
<svg viewBox="0 0 36 36">

<path
stroke="#333"
stroke-width="3"
fill="none"
d="M18 2.0845
a 15.9155 15.9155 0 0 1 0 31.831
a 15.9155 15.9155 0 0 1 0 -31.831"
/>

<path
stroke="#00c896"
stroke-width="3"
stroke-dasharray="64,100"
fill="none"
d="M18 2.0845
a 15.9155 15.9155 0 0 1 0 31.831
a 15.9155 15.9155 0 0 1 0 -31.831"
/>

</svg>

<div class="percent">64%</div>

</div>

</div>

</div>

<script src="mobileApp.js"></script>
</body>
</html>
